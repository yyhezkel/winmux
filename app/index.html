<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>winmux</title>
  </head>

  <body style="background: #0e1116; margin: 0;">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Polish: tiny splash that fades out shortly after first paint so the
         brief blank during SolidJS hydration looks intentional. The CSS
         animation runs on its own; no JS handoff needed. -->
    <div class="winmux-splash" aria-hidden="true">
      <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sp-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1d2330" />
            <stop offset="100%" stop-color="#0e1116" />
          </linearGradient>
          <linearGradient id="sp-acc" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7aa2f7" />
            <stop offset="100%" stop-color="#4ec9b0" />
          </linearGradient>
        </defs>
        <rect width="1024" height="1024" rx="200" fill="url(#sp-bg)" />
        <rect x="20" y="20" width="984" height="984" rx="184" fill="none" stroke="#21262d" stroke-width="4" />
        <polyline points="300,330 560,512 300,694" fill="none" stroke="url(#sp-acc)" stroke-width="86" stroke-linecap="round" stroke-linejoin="round" />
        <rect x="600" y="640" width="190" height="56" rx="28" fill="url(#sp-acc)" />
        <circle cx="848" cy="176" r="20" fill="#5cd87f" />
      </svg>
    </div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
