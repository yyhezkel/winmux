# winmux-tmux.conf
#
# Bundled with the winmux desktop. The bootstrap uploads this file to
# `~/.winmux/tmux.conf` on every server it provisions, and the tmux
# spawn passes `-f ~/.winmux/tmux.conf` so users get sane scrollback
# behaviour out of the box without having to author their own conf.
#
# Toggleable from Settings → Terminal → "Use winmux tmux config". When
# off, plain `tmux new-session -A` runs and the user's own
# ~/.tmux.conf (if any) applies.

# ─── Mouse + scrollback ────────────────────────────────────────────
# Phase 60 (smoke-test #8): mouse mode OFF by default. With `mouse on`
# tmux captures every click via xterm mouse-tracking, which kills the
# terminal's native left-drag text selection — the user could neither
# select nor copy. With mouse off:
#   - left-drag = native xterm.js selection (PuTTY / Windows Terminal
#     style), Ctrl+Shift+C copies (or plain Ctrl+C with the
#     copy-on-select setting)
#   - right-click = paste (handled by winmux's terminal layer)
#   - wheel = real tmux scrollback. tmux always owns the alternate
#     screen, so xterm.js would otherwise turn the wheel into bare
#     Up/Down arrows (= shell history, the v0.2.8 regression). Phase
#     65.O: winmux's xterm layer intercepts the wheel and sends
#     Alt+Up/Down, bound below to copy-mode scroll (see that section).
#   - wheel in vim/less/htop = the same Alt+arrows fall through as plain
#     arrows so the app pages natively
# Trade-off: clicking a tmux pane no longer focuses it and tmux's
# scrollback beyond the visible screen needs copy-mode (Ctrl+b [).
# Power users who prefer tmux-native mouse handling can flip this
# back on — the wheel bindings below only take effect when they do.
set -g mouse off

# Bigger ring buffer than tmux's 2000-line default so xterm.js's
# scroll-up shows real history instead of running into a wall.
set -g history-limit 50000

# When the wheel is used (ONLY in effect if the user re-enables
# `mouse on` above — inert otherwise):
#   - in an alt-screen app (vim/less/man/htop): pass it through so the
#     app handles it natively (vim scrolls the buffer, less pages)
#   - in a regular shell prompt: enter copy-mode and scroll the
#     scrollback ring, NOT shell history. (tmux's default behaviour
#     is to forward wheel events as Up/Down keys, which the shell
#     interprets as history navigation — surprising and unwanted.)
bind -n WheelUpPane if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" "send-keys -M" "copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" "send-keys -M" ""

# Wheel speed inside copy-mode. The default of one line per tick
# feels glacial on a high-DPI mouse.
bind -T copy-mode-vi WheelUpPane    send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane  send-keys -X -N 3 scroll-down
bind -T copy-mode    WheelUpPane    send-keys -X -N 3 scroll-up
bind -T copy-mode    WheelDownPane  send-keys -X -N 3 scroll-down

# ─── Phase 65.O: wheel scrollback while `mouse off` ─────────────────
# winmux's xterm.js layer intercepts the mouse wheel over the alternate
# screen (which tmux always owns) and sends Alt+Up / Alt+Down instead of
# the bare Up/Down arrows xterm would emit via its alt-scroll mode. That
# gives real scrollback WITHOUT `mouse on`, so native left-drag text
# selection keeps working. These bindings interpret the proxy keys:
#   - at a shell prompt (#{alternate_on}==0): enter copy-mode + scroll
#   - inside an alt-screen app (vim/less; alternate_on==1): forward the
#     plain arrow so the app scrolls/moves natively
bind -n M-Up   if-shell -F "#{alternate_on}" "send-keys Up"   "copy-mode -e ; send-keys -X -N 3 scroll-up"
bind -n M-Down if-shell -F "#{alternate_on}" "send-keys Down" "send-keys -X -N 3 scroll-down"
# Keep scrolling once already in copy-mode (the root-table bind above
# won't fire there — copy-mode has its own key table).
bind -T copy-mode    M-Up   send-keys -X -N 3 scroll-up
bind -T copy-mode    M-Down send-keys -X -N 3 scroll-down
bind -T copy-mode-vi M-Up   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi M-Down send-keys -X -N 3 scroll-down

# ─── UX niceties ───────────────────────────────────────────────────
# Don't redraw the whole screen when entering/leaving copy-mode.
set -g @scroll-without-changing-pane on

# Phase 55-C: re-pick the smallest client size when a winmux pane
# resizes. Without this, tmux uses the largest attached client's
# geometry, which leaves narrow trailing columns black on the
# new smaller pane. Aggressive-resize re-fits the inner window to
# the active client right after a SIGWINCH — the trade-off is that
# alt-screen apps (vim, htop) see their full terminal area shrink
# on every resize, which is exactly what we want for winmux.
set -g aggressive-resize on

# 256-colour + truecolour. xterm.js advertises both.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Phase 62.B (item J): let tmux PASS THROUGH OSC 8 hyperlinks to the
# outer terminal (xterm.js) so Claude Code's clickable file links
# survive inside a tmux session — without this tmux strips them.
# `terminal-features` is tmux 3.2+, so guard it (older tmux would error
# on the unknown option and abort sourcing the rest of this file).
%if "#{>=:#{version},3.2}"
set -ga terminal-features ",*:hyperlinks"
%endif

# Pass through focus events so editors (vim, emacs) know when the
# winmux pane regains focus and can autoread changed files.
set -g focus-events on

# A long enough escape-time so Ctrl+arrows etc. don't get mis-decoded,
# but short enough that ESC in vim doesn't feel laggy.
set -sg escape-time 30

# Status bar — minimal, just enough to see which session you're on.
set -g status-style "bg=#161b22 fg=#7d8590"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#7d8590] %H:%M "
set -g status-left-length 40
