<svg viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/><stop offset="1" stop-color="#4ec9b0"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/><stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="1180" height="720" rx="12" fill="#0e1116"/>
  <!-- titlebar -->
  <rect x="0" y="0" width="1180" height="34" rx="12" fill="#0b0e13"/>
  <rect x="0" y="22" width="1180" height="12" fill="#0b0e13"/>
  <circle cx="22" cy="17" r="5" fill="#f7768e"/><circle cx="40" cy="17" r="5" fill="#e0af68"/><circle cx="58" cy="17" r="5" fill="#4ec9b0"/>
  <text x="590" y="21" fill="#565f6a" font-size="12" text-anchor="middle">winmux</text>

  <!-- ===== SIDEBAR (inline-start) ===== -->
  <rect x="0" y="34" width="248" height="686" fill="#161b22"/>
  <line x1="248" y1="34" x2="248" y2="720" stroke="#21262d"/>
  <!-- brand -->
  <rect x="18" y="52" width="22" height="22" rx="6" fill="url(#brand)"/>
  <text x="50" y="69" fill="url(#brand)" font-size="16" font-weight="600" letter-spacing="0.4">winmux</text>

  <!-- EMPTY-STATE CTA CARD in sidebar -->
  <rect x="14" y="96" width="220" height="196" rx="10" fill="#1c2230" stroke="#2d333d"/>
  <circle cx="124" cy="146" r="26" fill="#0e1116" stroke="#2d333d"/>
  <path d="M124 134 v24 M112 146 h24" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
  <text x="124" y="196" fill="#e6edf3" font-size="13.5" font-weight="600" text-anchor="middle">No workspaces yet</text>
  <text x="124" y="216" fill="#7d8590" font-size="11.5" text-anchor="middle">Create one to start a</text>
  <text x="124" y="231" fill="#7d8590" font-size="11.5" text-anchor="middle">terminal or SSH session.</text>
  <rect x="30" y="246" width="188" height="32" rx="6" fill="#7aa2f7"/>
  <text x="124" y="267" fill="#0b0e13" font-size="12.5" font-weight="600" text-anchor="middle">+  New workspace</text>

  <!-- secondary action -->
  <rect x="30" y="300" width="188" height="30" rx="6" fill="none" stroke="#2d333d"/>
  <text x="124" y="320" fill="#7d8590" font-size="12" text-anchor="middle">🚀  Provision a server</text>

  <!-- sidebar footer -->
  <line x1="14" y1="672" x2="234" y2="672" stroke="#21262d"/>
  <text x="20" y="698" fill="#565f6a" font-size="11">v0.4.3</text>
  <text x="228" y="698" fill="#565f6a" font-size="11" text-anchor="end">⚙</text>

  <!-- ===== MAIN AREA welcome ===== -->
  <rect x="248" y="34" width="932" height="686" fill="url(#hero)"/>
  <!-- big glyph -->
  <rect x="682" y="150" width="64" height="64" rx="16" fill="#161b22" stroke="#2d333d"/>
  <rect x="694" y="150" width="40" height="40" rx="12" transform="rotate(0)" fill="url(#brand)" opacity="0.9" x2="0"/>
  <text x="714" y="196" font-size="30" text-anchor="middle">▚</text>
  <text x="714" y="262" fill="#e6edf3" font-size="26" font-weight="700" text-anchor="middle">Welcome to winmux</text>
  <text x="714" y="290" fill="#7d8590" font-size="14" text-anchor="middle">Your SSH workspaces, panes, and Claude Code — one window.</text>

  <!-- quick-start cards -->
  <g filter="url(#soft)">
    <rect x="404" y="330" width="196" height="150" rx="12" fill="#161b22" stroke="#21262d"/>
    <rect x="616" y="330" width="196" height="150" rx="12" fill="#161b22" stroke="#7aa2f7" stroke-opacity="0.5"/>
    <rect x="828" y="330" width="196" height="150" rx="12" fill="#161b22" stroke="#21262d"/>
  </g>
  <!-- card 1 local -->
  <circle cx="502" cy="372" r="20" fill="#1c2230"/><text x="502" y="379" font-size="18" text-anchor="middle">▮</text>
  <text x="502" y="414" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">Local terminal</text>
  <text x="502" y="435" fill="#7d8590" font-size="11.5" text-anchor="middle">Open a shell on this PC</text>
  <text x="502" y="463" fill="#565f6a" font-size="11" text-anchor="middle">Ctrl+Shift+T</text>
  <!-- card 2 ssh (featured) -->
  <circle cx="714" cy="372" r="20" fill="#7aa2f7" fill-opacity="0.16"/><text x="714" y="379" font-size="18" text-anchor="middle">🌐</text>
  <text x="714" y="414" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">Connect via SSH</text>
  <text x="714" y="435" fill="#7d8590" font-size="11.5" text-anchor="middle">Attach to a remote host</text>
  <rect x="664" y="450" width="100" height="20" rx="10" fill="#7aa2f7" fill-opacity="0.16"/>
  <text x="714" y="464" fill="#94b4ff" font-size="10.5" font-weight="600" text-anchor="middle">RECOMMENDED</text>
  <!-- card 3 provision -->
  <circle cx="926" cy="372" r="20" fill="#1c2230"/><text x="926" y="379" font-size="18" text-anchor="middle">🚀</text>
  <text x="926" y="414" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">Provision a server</text>
  <text x="926" y="435" fill="#7d8590" font-size="11.5" text-anchor="middle">Guided setup wizard</text>
  <text x="926" y="463" fill="#565f6a" font-size="11" text-anchor="middle">Fresh VPS → ready</text>

  <!-- command palette hint -->
  <rect x="560" y="524" width="308" height="40" rx="20" fill="#161b22" stroke="#21262d"/>
  <text x="592" y="549" fill="#7d8590" font-size="12.5">Press</text>
  <rect x="636" y="533" width="92" height="22" rx="5" fill="#0e1116" stroke="#2d333d"/>
  <text x="682" y="549" fill="#e6edf3" font-size="11.5" font-family="monospace" text-anchor="middle">Ctrl Shift P</text>
  <text x="740" y="549" fill="#7d8590" font-size="12.5">for all commands</text>

  <text x="714" y="626" fill="#565f6a" font-size="11.5" text-anchor="middle">Empty state — shown when no workspace is active. Sidebar CTA + main welcome share one call-to-action.</text>
</svg>
